<!DOCTYPE html>
<html>

<head> 

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>TRC DEX</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/ethers@6.10.0/dist/ethers.umd.min.js"></script>

</head>

<body>

<header>

<div class="logo">TRC / POL</div>

<div class="pricePanel">

TRC <span id="trcPrice">$0</span>

POL <span id="polPrice">$0</span>

</div>

<button id="connectBtn">Connect Wallet</button>

</header>

<div class="main">

<div class="chartBox">

<canvas id="priceChart"></canvas>

</div>

<div class="tradeBox">

<h2>Trade TRC</h2>

<div class="balance">
Balance: <span id="trcBalance">0</span> TRC
</div>

<input id="buyAmount" placeholder="POL amount to buy">

<button id="buyBtn">BUY TRC</button>

<input id="sellAmount" placeholder="POL amount to receive">

<button id="sellBtn">SELL TRC</button>

<div class="cooldown">
Next Sell: <span id="cooldown">Loading...</span>
</div>

<div id="status"></div>

</div>

</div>

<div class="historyBox">

<h3>Recent Trades</h3>

<div id="history"></div>

</div>

<script src="app.js"></script>

</body>
</html>
