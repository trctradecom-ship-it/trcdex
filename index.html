<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>TRC Exchange</title>

<link rel="icon" href="./trcnew.png?v=2">
<link rel="shortcut icon" href="./favicon.ico?v=2">
<link rel="apple-touch-icon" href="./trcnew.png">
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#000000">

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>

</head>

<body>

<header>

<h2>TRC / POL Exchange</h2>

<button onclick="connectWallet()">Connect Wallet</button>

<div id="walletAddress"></div>

</header>


<div class="stats">

<div class="box">
POL Price
<div id="polPrice">$0</div>
</div>

<div class="box">
TRC Price
<div id="trcPrice">$0</div>
</div>

<div class="box">
Your TRC
<div id="trcBalance">0</div>
</div>

<div class="box">
Your POL
<div id="polBalance">0</div>
</div>

<div class="box">
TRC Value
<div id="trcValue">$0</div>
</div>

</div>


<div class="main">

<div class="chartBox">

<!-- ✅ NEW: CHART CONTROLS (ADDED) -->
<div class="chart-controls">

  <!-- Timeframes -->
  <div class="tf-group">
    <button onclick="setTimeframe('5m')">5M</button>
    <button onclick="setTimeframe('15m')">15M</button>
    <button onclick="setTimeframe('30m')">30M</button>
    <button onclick="setTimeframe('1h')" class="active">1H</button>
    <button onclick="setTimeframe('4h')">4H</button>
    <button onclick="setTimeframe('1d')">1D</button>
    <button onclick="setTimeframe('1w')">1W</button>
  </div>

  <!-- Indicators -->
  <div class="indicator-group">
    <button onclick="toggleEMA(20)" class="active">EMA 20</button>
    <button onclick="toggleEMA(50)">EMA 50</button>
    <button onclick="toggleEMA(200)">EMA 200</button>
  </div>

</div>
<!-- ✅ END NEW -->

<div id="chart"></div>

</div>


<div class="tradeBox">

<h3>Buy TRC</h3>

<input id="buyAmount" placeholder="POL amount">

<button onclick="buyTRC()">BUY</button>

<h3>Sell TRC</h3>

<input id="sellAmount" placeholder="POL amount you want">

<button onclick="maxSell()">MAX</button>

<button onclick="approveTRC()">Approve TRC</button>

<button onclick="sellTRC()">SELL</button>

<div class="cooldown">
Next Sell: <span id="cooldown">Loading...</span>
</div>

<div id="status"></div>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
