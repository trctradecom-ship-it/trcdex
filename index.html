<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TRC Exchange</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>

<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

</head>

<body>

<div class="app">

<div class="header">

<div class="market">

TRC / POL

<div class="prices">

<span id="trcPrice">$0</span>
<span id="polPrice">$0</span>

</div>

</div>

<div id="wallet">Not Connected</div>

<button onclick="connect()">Connect</button>

</div>


<div class="main">

<div class="chartSide">

<div class="tf">

<button onclick="tf(1800)">30M</button>
<button onclick="tf(3600)">1H</button>
<button onclick="tf(14400)">4H</button>
<button onclick="tf(86400)">1D</button>

<button onclick="line()">Line</button>
<button onclick="candle()">Candle</button>

</div>

<div id="chart"></div>

<div class="history">

<h3>Trades</h3>

<div id="tradeList"></div>

</div>

</div>


<div class="tradePanel">

<h3>Trade</h3>

<input id="polAmount" placeholder="POL amount">

<button class="buy" onclick="buy()">BUY</button>

<button class="sell" onclick="sell()">SELL</button>

<div class="info">

<div>Last Sell<br><span id="lastSell"></span></div>

<div>Next Sell<br><span id="nextSell"></span></div>

</div>

<div id="status"></div>

</div>

</div>

</div>


<script>

const contractAddress="0xA6F33c57891E52258d68BC99c593207E5C1B4a51"

const abi=[

"function buy() payable",
"function sell(uint256)",
"function getLatestPrice() view returns(uint256)",
"function usdPrice() view returns(uint256)",
"function SELL_COOLDOWN() view returns(uint256)",
"function getLastSellTime(address) view returns(uint256)",

"event TokensPurchased(address buyer,uint256 polPaid,uint256 tokensReceived)",
"event TokensSold(address seller,uint256 tokensSold,uint256 polReceived)"

]

let provider
let signer
let contract
let user

let chart
let candleSeries
let lineSeries
let volumeSeries

let frame=3600

function human(v){
return Number(v).toLocaleString(undefined,{maximumFractionDigits:6})
}

function utc(t){
return new Date(t*1000).toUTCString()
}

async function connect(){

await window.ethereum.request({method:'eth_requestAccounts'})

provider=new ethers.providers.Web3Provider(window.ethereum)

signer=provider.getSigner()

user=await signer.getAddress()

document.getElementById("wallet").innerText=user

contract=new ethers.Contract(contractAddress,abi,signer)

initChart()

load()

listenEvents()

}

function initChart(){

chart=LightweightCharts.createChart(document.getElementById("chart"),{

width:document.getElementById("chart").clientWidth,

height:350,

layout:{background:{color:"#000"},textColor:"#DDD"},

grid:{vertLines:{color:"#111"},horzLines:{color:"#111"}},

timeScale:{timeVisible:true}

})

candleSeries=chart.addCandlestickSeries({

upColor:"#00ff88",
downColor:"#ff4d4d",
borderVisible:false,
wickUpColor:"#00ff88",
wickDownColor:"#ff4d4d"

})

lineSeries=chart.addLineSeries({color:"#FFD700",lineWidth:2})

volumeSeries=chart.addHistogramSeries({

priceFormat:{type:'volume'},

priceScaleId:''

})

}

function tf(v){

frame=v

}

function line(){

lineSeries.setData([])

}

function candle(){

candleSeries.setData([])

}

async function load(){

let p=await contract.getLatestPrice()

let u=await contract.usdPrice()

let price=Number(p)/1e18
let usd=Number(u)/1e18

document.getElementById("trcPrice").innerText="$"+human(price)
document.getElementById("polPrice").innerText="$"+human(usd)

let time=Math.floor(Date.now()/1000)

let candle={

time:time,
open:price,
high:price,
low:price,
close:price

}

candleSeries.update(candle)

lineSeries.update({time:time,value:price})

volumeSeries.update({time:time,value:Math.random()*100})

updateSellInfo()

setTimeout(load,frame*1000)

}

async function updateSellInfo(){

let last=await contract.getLastSellTime(user)

let cooldown=await contract.SELL_COOLDOWN()

if(last==0){

document.getElementById("lastSell").innerText="Never"
document.getElementById("nextSell").innerText="Available"

return

}

let next=Number(last)+Number(cooldown)

document.getElementById("lastSell").innerText=utc(last)

document.getElementById("nextSell").innerText=utc(next)

}

async function buy(){

try{

let val=document.getElementById("polAmount").value

let tx=await contract.buy({

value:ethers.utils.parseEther(val)

})

status("Transaction Sent")

await tx.wait()

status("Buy Confirmed")

}catch(e){

status("Failed")

}

}

async function sell(){

try{

let val=document.getElementById("polAmount").value

let tx=await contract.sell(

ethers.utils.parseEther(val)

)

status("Transaction Sent")

await tx.wait()

status("Sell Confirmed")

}catch(e){

status("Failed")

}

}

function status(t){

document.getElementById("status").innerText=t

}

function listenEvents(){

contract.on("TokensPurchased",(buyer,pol,tokens)=>{

addTrade("BUY",pol)

})

contract.on("TokensSold",(seller,tokens,pol)=>{

addTrade("SELL",pol)

})

}

function addTrade(type,val){

let el=document.createElement("div")

el.className=type=="BUY"?"buyRow":"sellRow"

el.innerText=type+" "+human(Number(val)/1e18)+" POL"

document.getElementById("tradeList").prepend(el)

}

</script>

</body>
</html>
