<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TRC Exchange</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

</head>

<body>  

<div class="header">

<div class="pair">TRC / POL</div>

<div class="priceBox">
TRC Price: <span id="trcPrice">$0</span>
</div>

<div id="wallet">Wallet Not Connected</div>

<button onclick="connect()">Connect</button>

</div>


<div class="layout">


<div class="chartSection">

<div class="controls">

<button onclick="setTF(1800)">30m</button>
<button onclick="setTF(3600)">1h</button>
<button onclick="setTF(14400)">4h</button>
<button onclick="setTF(86400)">1d</button>

<button onclick="showLine()">Line</button>
<button onclick="showCandle()">Candle</button>

</div>

<div id="chart"></div>

<div class="trades">

<h3>Recent Trades</h3>

<div id="tradeList"></div>

</div>

</div>



<div class="tradePanel">

<h3>Trade</h3>

<input id="amount" placeholder="POL amount">

<button class="buyBtn" onclick="buy()">Buy TRC</button>

<button class="sellBtn" onclick="sell()">Sell TRC</button>

<div class="info">

<div>
Last Sell
<span id="lastSell"></span>
</div>

<div>
Next Sell
<span id="nextSell"></span>
</div>

</div>

<div id="status"></div>

</div>


</div>


<script>

const contractAddress="0xA6F33c57891E52258d68BC99c593207E5C1B4a51"

const abi=[

"function buy() payable",
"function sell(uint256)",
"function getLatestPrice() view returns(uint256)",
"function usdPrice() view returns(uint256)",
"function SELL_COOLDOWN() view returns(uint256)",
"function getLastSellTime(address) view returns(uint256)",

"event TokensPurchased(address buyer,uint256 polPaid,uint256 tokensReceived)",
"event TokensSold(address seller,uint256 tokensSold,uint256 polReceived)"

]

let provider
let signer
let contract
let user

let chart
let lineSeries
let candleSeries

function human(v){
return Number(v).toLocaleString(undefined,{maximumFractionDigits:6})
}

async function connect(){

await window.ethereum.request({method:"eth_requestAccounts"})

provider=new ethers.providers.Web3Provider(window.ethereum)

signer=provider.getSigner()

user=await signer.getAddress()

document.getElementById("wallet").innerText=user

contract=new ethers.Contract(contractAddress,abi,signer)

initChart()

load()

listenTrades()

}

function initChart(){

chart=LightweightCharts.createChart(document.getElementById("chart"),{

width:document.getElementById("chart").clientWidth,

height:380,

layout:{
background:{color:"#0b0e11"},
textColor:"#DDD"
},

grid:{
vertLines:{color:"#1c1f26"},
horzLines:{color:"#1c1f26"}
}

})

lineSeries=chart.addLineSeries({
color:"#f0b90b",
lineWidth:2
})

candleSeries=chart.addCandlestickSeries({

upColor:"#0ecb81",
downColor:"#f6465d",
borderVisible:false,
wickUpColor:"#0ecb81",
wickDownColor:"#f6465d"

})

}

function showLine(){
lineSeries.setData([])
}

function showCandle(){
candleSeries.setData([])
}

function setTF(v){
console.log("timeframe",v)
}

async function load(){

let p=await contract.getLatestPrice()

let price=Number(p)/1e18

document.getElementById("trcPrice").innerText="$"+human(price)

let t=Math.floor(Date.now()/1000)

lineSeries.update({time:t,value:price})

candleSeries.update({

time:t,
open:price,
high:price,
low:price,
close:price

})

updateSellInfo()

setTimeout(load,5000)

}

async function updateSellInfo(){

let last=await contract.getLastSellTime(user)

let cooldown=await contract.SELL_COOLDOWN()

if(last==0){

document.getElementById("lastSell").innerText="Never"
document.getElementById("nextSell").innerText="Available"

return

}

let next=Number(last)+Number(cooldown)

document.getElementById("lastSell").innerText=new Date(last*1000).toLocaleString()

document.getElementById("nextSell").innerText=new Date(next*1000).toLocaleString()

}

async function buy(){

try{

let val=document.getElementById("amount").value

let tx=await contract.buy({
value:ethers.utils.parseEther(val)
})

status("Transaction Sent")

await tx.wait()

status("Buy Confirmed")

}catch(e){

status(e.message)

}

}

async function sell(){

try{

let val=document.getElementById("amount").value

let tx=await contract.sell(
ethers.utils.parseEther(val)
)

status("Transaction Sent")

await tx.wait()

status("Sell Confirmed")

}catch(e){

status(e.message)

}

}

function status(t){
document.getElementById("status").innerText=t
}

function listenTrades(){

contract.on("TokensPurchased",(buyer,pol)=>{

addTrade("BUY",pol)

})

contract.on("TokensSold",(seller,tokens,pol)=>{

addTrade("SELL",pol)

})

}

function addTrade(type,val){

let row=document.createElement("div")

row.className=type=="BUY"?"buy":"sell"

row.innerText=type+" "+human(Number(val)/1e18)+" POL"

document.getElementById("tradeList").prepend(row)

}

</script>

</body>
</html>
